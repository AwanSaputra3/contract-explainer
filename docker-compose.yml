version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: contract_explainer_db
    restart: always
    environment:
      POSTGRES_DB: contract_explainer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
